<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BP 번역기</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #12121e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

        /* 상단 헤더 */
        .header { background: #1a1a2e; border-bottom: 1px solid #2a2a4e; padding: 10px 20px; display: flex; align-items: center; gap: 12px; }
        .header h1 { font-size: 18px; color: #e0a800; flex: 1; }
        .btn-setting { background: #2a2a4e; border: 1px solid #3a3a6e; color: #aaa; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .btn-setting:hover { background: #3a3a6e; color: #fff; }

        /* 메인 레이아웃 */
        .main { display: flex; flex: 1; overflow: hidden; }

        /* 번역 영역 50% */
        .panel-translate { width: 50%; border-right: 1px solid #2a2a4e; display: flex; flex-direction: column; padding: 16px; gap: 10px; }
        .panel-translate textarea { flex: 1; background: #1e1e32; color: #e0e0e0; border: 1px solid #3a3a6e; border-radius: 8px; padding: 12px; font-size: 14px; resize: none; outline: none; min-height: 120px; max-height: 200px; }
        .panel-translate textarea:focus { border-color: #e0a800; }
        .translate-actions { display: flex; gap: 8px; }
        .btn-translate { background: #e0a800; color: #12121e; border: none; padding: 9px 24px; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .btn-translate:hover { background: #ffc107; }
        .btn-clear { background: #2a2a4e; color: #aaa; border: 1px solid #3a3a6e; padding: 9px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; }
        .result-box { background: #1e1e32; border: 1px solid #3a3a6e; border-radius: 8px; padding: 12px; min-height: 80px; font-size: 14px; white-space: pre-wrap; line-height: 1.6; position: relative; }
        .result-box .copy-btn { position: absolute; top: 8px; right: 8px; background: #2a2a4e; border: 1px solid #3a3a6e; color: #aaa; padding: 3px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .result-box .copy-btn:hover { background: #e0a800; color: #12121e; }
        .result-text { padding-right: 60px; }
        .loading { color: #888; font-style: italic; }

        /* 히스토리 영역 15% */
        .panel-history { width: 15%; border-right: 1px solid #2a2a4e; display: flex; flex-direction: column; overflow: hidden; }
        .panel-title { background: #1a1a2e; padding: 10px 10px; font-size: 12px; color: #e0a800; font-weight: bold; border-bottom: 1px solid #2a2a4e; display: flex; justify-content: space-between; align-items: center; }
        .panel-title button { background: none; border: none; color: #666; font-size: 11px; cursor: pointer; }
        .panel-title button:hover { color: #e0a800; }
        .history-list { flex: 1; overflow-y: auto; padding: 6px; display: flex; flex-direction: column; gap: 4px; }
        .history-item { background: #1e1e32; border: 1px solid #2a2a4e; border-radius: 6px; padding: 7px 8px; cursor: pointer; font-size: 11px; line-height: 1.4; }
        .history-item:hover { border-color: #e0a800; background: #252540; }
        .history-item .h-original { color: #aaa; margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .history-item .h-translated { color: #e0e0e0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 프리셋 영역 35% */
        .panel-preset { width: 35%; display: flex; flex-direction: column; overflow: hidden; }
        .preset-grid { flex: 1; overflow-y: auto; padding: 8px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; align-content: start; }
        .preset-btn { background: #1e1e32; border: 1px solid #2a2a4e; border-radius: 6px; padding: 7px 6px; font-size: 11px; color: #e0e0e0; cursor: pointer; text-align: center; position: relative; line-height: 1.3; min-height: 44px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
        .preset-btn:hover { border-color: #e0a800; background: #252540; }
        .preset-btn .p-label { font-weight: bold; color: #e0a800; font-size: 10px; }
        .preset-btn .p-text { color: #ccc; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; text-align: center; }
        .preset-btn .p-actions { display: none; position: absolute; top: 2px; right: 2px; gap: 2px; }
        .preset-btn:hover .p-actions { display: flex; }
        .p-actions button { background: #2a2a4e; border: none; color: #aaa; width: 16px; height: 16px; border-radius: 3px; cursor: pointer; font-size: 9px; display: flex; align-items: center; justify-content: center; }
        .p-actions button:hover { background: #e0a800; color: #12121e; }
        .preset-add { background: #1a2a1a; border: 1px dashed #3a6a3a; border-radius: 6px; padding: 7px 6px; font-size: 20px; color: #3a6a3a; cursor: pointer; display: flex; align-items: center; justify-content: center; min-height: 44px; }
        .preset-add:hover { border-color: #4CAF50; color: #4CAF50; background: #1e321e; }

        /* 모달 공통 */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: #1a1a2e; border: 1px solid #3a3a6e; border-radius: 12px; padding: 24px; min-width: 420px; max-width: 600px; width: 90%; }
        .modal h2 { color: #e0a800; font-size: 16px; margin-bottom: 16px; }
        .modal-section { margin-bottom: 12px; }
        .modal-section label { font-size: 12px; color: #aaa; display: block; margin-bottom: 6px; }
        .modal-section input, .modal-section textarea { width: 100%; background: #12121e; border: 1px solid #3a3a6e; border-radius: 6px; padding: 8px 10px; color: #e0e0e0; font-size: 13px; outline: none; }
        .modal-section input:focus, .modal-section textarea:focus { border-color: #e0a800; }
        .modal-section textarea { min-height: 300px; resize: vertical; font-family: monospace; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
        .btn-primary { background: #e0a800; color: #12121e; border: none; padding: 8px 20px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; }
        .btn-secondary { background: #2a2a4e; color: #aaa; border: 1px solid #3a3a6e; padding: 8px 20px; border-radius: 6px; font-size: 13px; cursor: pointer; }
        .btn-danger { background: #4a1a1a; color: #ff6b6b; border: 1px solid #6a2a2a; padding: 8px 20px; border-radius: 6px; font-size: 13px; cursor: pointer; }

        /* 설정 모달 메뉴 */
        .setting-menu { display: flex; flex-direction: column; gap: 8px; }
        .setting-menu-item { background: #12121e; border: 1px solid #2a2a4e; border-radius: 8px; padding: 12px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .setting-menu-item:hover { border-color: #e0a800; }
        .setting-menu-item span { font-size: 13px; }
        .setting-menu-item .arrow { color: #666; }

        .history-item { position: relative; padding-right: 24px; }
        .h-preset-btn { position: absolute; top: 50%; right: 4px; transform: translateY(-50%); background: #2a2a4e; border: 1px solid #3a3a6e; color: #e0a800; width: 18px; height: 18px; border-radius: 4px; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; line-height: 1; }
        .h-preset-btn:hover { background: #e0a800; color: #12121e; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #12121e; }
        ::-webkit-scrollbar-thumb { background: #3a3a6e; border-radius: 2px; }
    </style>
</head>
<body>

<div class="header">
    <h1>⚔️ BP 번역기</h1>
    <button class="btn-setting" onclick="openSetting()">⚙️ 설정</button>
</div>

<div class="main">

    <!-- 번역 패널 -->
    <div class="panel-translate">
        <textarea id="inputText" placeholder="번역할 텍스트 입력... (Ctrl+Enter로 번역)"></textarea>
        <div class="translate-actions">
            <button class="btn-translate" onclick="doTranslate()">번역</button>
            <button class="btn-clear" onclick="clearAll()">초기화</button>
        </div>
        <div class="result-box">
            <div class="result-text" id="resultText"><span style="color:#555">번역 결과가 여기에 표시됩니다</span></div>
            <button class="copy-btn" onclick="copyResult()">복사</button>
        </div>
    </div>

    <!-- 히스토리 패널 -->
    <div class="panel-history">
        <div class="panel-title">
            📋 최근 번역
            <button onclick="clearHistory()">전체삭제</button>
        </div>
        <div class="history-list" id="historyList"></div>
    </div>

    <!-- 프리셋 패널 -->
    <div class="panel-preset">
        <div class="panel-title">⭐ 프리셋</div>
        <div class="preset-grid" id="presetGrid"></div>
    </div>

</div>

<!-- 설정 모달 -->
<div class="modal-overlay" id="modalSetting">
    <div class="modal">
        <h2>⚙️ 설정</h2>
        <div class="setting-menu">
            <div class="setting-menu-item" onclick="openPromptModal()">
                <span>📝 프롬프트 편집</span>
                <span class="arrow">▶</span>
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn-secondary" onclick="closeSetting()">닫기</button>
        </div>
    </div>
</div>

<!-- 프롬프트 편집 모달 -->
<div class="modal-overlay" id="modalPrompt">
    <div class="modal" style="max-width:700px">
        <h2>📝 프롬프트 편집</h2>
        <div class="modal-section">
            <label>시스템 프롬프트</label>
            <textarea id="promptText"></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn-danger" onclick="resetPrompt()">기본값으로 초기화</button>
            <button class="btn-secondary" onclick="closePromptModal()">취소</button>
            <button class="btn-primary" onclick="savePrompt()">저장</button>
        </div>
    </div>
</div>

<!-- 프리셋 추가/수정 모달 -->
<div class="modal-overlay" id="modalPreset">
    <div class="modal">
        <h2 id="presetModalTitle">프리셋 추가</h2>
        <div class="modal-section">
            <label>라벨 (버튼에 표시될 이름)</label>
            <input type="text" id="presetLabel" placeholder="예: 거탑 모집">
        </div>
        <div class="modal-section">
            <label>내용 (클릭 시 복사될 텍스트)</label>
            <textarea id="presetTextInput" style="min-height:80px" placeholder="예: 거탑 M19 @T1 D2 31500 or 해무기"></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn-secondary" onclick="closePresetModal()">취소</button>
            <button class="btn-primary" onclick="savePreset()">저장</button>
        </div>
    </div>
</div>

<script>
    let editingPresetId = null;
    let history = JSON.parse(localStorage.getItem('bp_history') || '[]');
    let defaultPrompt = '';

    // 초기화
    async function init() {
      renderHistory();
      await loadPresets();
      const res = await fetch('/prompt');
      const data = await res.json();
      defaultPrompt = data.prompt;
    }

    // 번역
    async function doTranslate() {
      const text = document.getElementById('inputText').value.trim();
      if (!text) return;
      const resultEl = document.getElementById('resultText');
      resultEl.innerHTML = '<span class="loading">번역 중...</span>';
      try {
        const res = await fetch('/translate', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({text})
        });
        const result = await res.text();
        resultEl.textContent = result;
        addHistory(text, result);
      } catch(e) {
        resultEl.textContent = '오류가 발생했습니다.';
      }
    }

    function clearAll() {
      document.getElementById('inputText').value = '';
      document.getElementById('resultText').innerHTML = '<span style="color:#555">번역 결과가 여기에 표시됩니다</span>';
    }

    function copyResult() {
      const text = document.getElementById('resultText').textContent;
      if (text && text !== '번역 결과가 여기에 표시됩니다') {
        navigator.clipboard.writeText(text);
      }
    }

    // Ctrl+Enter 번역
    document.getElementById('inputText').addEventListener('keydown', e => {
      if (e.ctrlKey && e.key === 'Enter') doTranslate();
    });

    // 히스토리
    function addHistory(original, translated) {
      history.unshift({original, translated, id: Date.now()});
      if (history.length > 20) history.pop();
      localStorage.setItem('bp_history', JSON.stringify(history));
      renderHistory();
    }

    function renderHistory() {
      const el = document.getElementById('historyList');
      el.innerHTML = history.map(h => `
        <div class="history-item">
          <div class="h-original" onclick="setInput('${escHtml(h.original)}')">${escHtml(h.original)}</div>
          <div class="h-translated" onclick="setInput('${escHtml(h.translated)}')">${escHtml(h.translated)}</div>
          <button class="h-preset-btn" onclick="openPresetFromHistory('${escHtml(h.translated)}')">+</button>
        </div>
      `).join('');
    }

    function clearHistory() {
      history = [];
      localStorage.setItem('bp_history', '[]');
      renderHistory();
    }

    function setInput(text) {
      document.getElementById('inputText').value = text;
    }

    // 프리셋
    async function loadPresets() {
      const res = await fetch('/api/preset');
      const presets = await res.json();
      renderPresets(presets);
    }

    function renderPresets(presets) {
      const grid = document.getElementById('presetGrid');
      grid.innerHTML = presets.map(p => `
        <div class="preset-btn" onclick="copyPreset('${escHtml(p.text)}')">
          <div class="p-label">${escHtml(p.label)}</div>
          <div class="p-text">${escHtml(p.text)}</div>
          <div class="p-actions">
            <button onclick="event.stopPropagation();editPreset('${p.id}','${escHtml(p.label)}','${escHtml(p.text)}')">✏</button>
            <button onclick="event.stopPropagation();deletePreset('${p.id}')">✕</button>
          </div>
        </div>
      `).join('') + `<div class="preset-add" onclick="openPresetModal()">+</div>`;
    }

    function copyPreset(text) {
      navigator.clipboard.writeText(text);
      // 입력창에도 넣기
      document.getElementById('inputText').value = text;
    }

    function openPresetModal() {
      editingPresetId = null;
      document.getElementById('presetModalTitle').textContent = '프리셋 추가';
      document.getElementById('presetLabel').value = '';
      document.getElementById('presetTextInput').value = '';
      document.getElementById('modalPreset').classList.add('active');
    }

    function openPresetFromHistory(translatedText) {
      editingPresetId = null;
      document.getElementById('presetModalTitle').textContent = '프리셋 추가';
      document.getElementById('presetLabel').value = '';
      document.getElementById('presetTextInput').value = translatedText;
      document.getElementById('modalPreset').classList.add('active');
    }

    function editPreset(id, label, text) {
      editingPresetId = id;
      document.getElementById('presetModalTitle').textContent = '프리셋 수정';
      document.getElementById('presetLabel').value = label;
      document.getElementById('presetTextInput').value = text;
      document.getElementById('modalPreset').classList.add('active');
    }

    async function savePreset() {
      const label = document.getElementById('presetLabel').value.trim();
      const text = document.getElementById('presetTextInput').value.trim();
      if (!label || !text) return;
      if (editingPresetId) {
        await fetch(`/api/preset/${editingPresetId}`, {
          method: 'PUT',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({label, text})
        });
      } else {
        await fetch('/api/preset', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({label, text})
        });
      }
      closePresetModal();
      await loadPresets();
    }

    async function deletePreset(id) {
      await fetch(`/api/preset/${id}`, {method: 'DELETE'});
      await loadPresets();
    }

    function closePresetModal() {
      document.getElementById('modalPreset').classList.remove('active');
    }

    // 설정 모달
    function openSetting() { document.getElementById('modalSetting').classList.add('active'); }
    function closeSetting() { document.getElementById('modalSetting').classList.remove('active'); }

    // 프롬프트 모달
    async function openPromptModal() {
      const res = await fetch('/prompt');
      const data = await res.json();
      document.getElementById('promptText').value = data.prompt;
      document.getElementById('modalPrompt').classList.add('active');
    }

    function closePromptModal() { document.getElementById('modalPrompt').classList.remove('active'); }

    async function savePrompt() {
      const prompt = document.getElementById('promptText').value;
      await fetch('/prompt', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({prompt})
      });
      closePromptModal();
    }

    async function resetPrompt() {
      document.getElementById('promptText').value = defaultPrompt;
    }

    // 유틸
    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // 모달 외부 클릭 닫기
    document.querySelectorAll('.modal-overlay').forEach(el => {
      el.addEventListener('click', e => { if (e.target === el) el.classList.remove('active'); });
    });

    init();
</script>
</body>
</html>
