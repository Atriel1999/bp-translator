<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BP 번역기</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #12121e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

        /* 상단 헤더 */
        .header { background: #1a1a2e; border-bottom: 1px solid #2a2a4e; padding: 10px 20px; display: flex; align-items: center; gap: 12px; }
        .header h1 { font-size: 18px; color: #e0a800; flex: 1; }
        .btn-setting { background: #2a2a4e; border: 1px solid #3a3a6e; color: #aaa; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .btn-setting:hover { background: #3a3a6e; color: #fff; }

        .user-switch { display: flex; gap: 6px; }
        .user-btn { background: #2a2a4e; border: 1px solid #3a3a6e; color: #aaa; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .user-btn:hover { background: #3a3a6e; color: #fff; }
        .user-btn.active { background: #e0a800; color: #12121e; border-color: #e0a800; }

        /* 메인 레이아웃 */
        .main { display: flex; flex: 1; overflow: hidden; }

        /* 번역 영역 50% */
        .panel-translate { width: 50%; border-right: 1px solid #2a2a4e; display: flex; flex-direction: column; padding: 16px; gap: 10px; }
        .panel-translate textarea { flex: 1; background: #1e1e32; color: #e0e0e0; border: 1px solid #3a3a6e; border-radius: 8px; padding: 12px; font-size: 14px; resize: none; outline: none; min-height: 120px; max-height: 200px; }
        .panel-translate textarea:focus { border-color: #e0a800; }
        .translate-actions { display: flex; gap: 8px; }
        .btn-translate { background: #e0a800; color: #12121e; border: none; padding: 9px 24px; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .btn-translate:hover { background: #ffc107; }
        .btn-clear { background: #2a2a4e; color: #aaa; border: 1px solid #3a3a6e; padding: 9px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; }
        .result-box { background: #1e1e32; border: 1px solid #3a3a6e; border-radius: 8px; padding: 12px; min-height: 80px; font-size: 14px; white-space: pre-wrap; line-height: 1.6; position: relative; }
        .result-box .copy-btn { position: absolute; top: 8px; right: 8px; background: #2a2a4e; border: 1px solid #3a3a6e; color: #aaa; padding: 3px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .result-box .copy-btn:hover { background: #e0a800; color: #12121e; }
        .result-text { padding-right: 60px; }
        .loading { color: #888; font-style: italic; }

        /* 히스토리 영역 15% */
        .panel-history { width: 15%; border-right: 1px solid #2a2a4e; display: flex; flex-direction: column; overflow: hidden; }
        .panel-title { background: #1a1a2e; padding: 10px 10px; font-size: 12px; color: #e0a800; font-weight: bold; border-bottom: 1px solid #2a2a4e; display: flex; justify-content: space-between; align-items: center; }
        .panel-title button { background: none; border: none; color: #666; font-size: 11px; cursor: pointer; }
        .panel-title button:hover { color: #e0a800; }
        .history-list { flex: 1; overflow-y: auto; padding: 6px; display: flex; flex-direction: column; gap: 4px; }
        .history-item { background: #1e1e32; border: 1px solid #2a2a4e; border-radius: 6px; padding: 7px 8px; cursor: pointer; font-size: 11px; line-height: 1.4; }
        .history-item:hover { border-color: #e0a800; background: #252540; }
        .history-item .h-original { color: #aaa; margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .history-item .h-translated { color: #e0e0e0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 프리셋 영역 35% */
        .panel-preset { width: 35%; display: flex; flex-direction: column; overflow: hidden; }
        .preset-grid { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-wrap: wrap; gap: 5px; align-content: start; position: relative;}
        .preset-grid.is-dragging { user-select: none; }
        .preset-grid.is-dragging .preset-btn { pointer-events: none; }
        .preset-grid.is-dragging .preset-btn.dragging { pointer-events: none; }
        .preset-btn { background: #1e1e32; border: 1px solid #2a2a4e; border-radius: 6px; padding: 7px 6px; font-size: 11px; color: #e0e0e0; cursor: pointer; text-align: center; position: relative; line-height: 1.3; min-height: 44px; max-height: 56px; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; width: calc(33.33% - 4px); }
        .drop-indicator { position: absolute; width: 2px; height: 44px; background: #e0a800; box-shadow: 0 0 6px #e0a800; pointer-events: none; border-radius: 2px; z-index: 10; }
        .preset-btn:hover { border-color: #e0a800; background: #252540; }
        .preset-btn .p-label { font-weight: bold; color: #e0a800; font-size: 10px; }
        .preset-btn .p-text { color: #ccc; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; text-align: center; }
        .preset-btn .p-actions { display: none; position: absolute; top: 2px; right: 2px; gap: 2px; }
        .preset-btn:hover .p-actions { display: flex; }
        .p-actions button { background: #2a2a4e; border: none; color: #aaa; width: 16px; height: 16px; border-radius: 3px; cursor: pointer; font-size: 9px; display: flex; align-items: center; justify-content: center; }
        .p-actions button:hover { background: #e0a800; color: #12121e; }
        .preset-add { background: #1a2a1a; border: 1px dashed #3a6a3a; border-radius: 6px; padding: 7px 6px; font-size: 20px; color: #3a6a3a; cursor: pointer; display: flex; align-items: center; justify-content: center; min-height: 44px; }
        .preset-add:hover { border-color: #4CAF50; color: #4CAF50; background: #1e321e; }

        .preset-section-label { grid-column: 1 / -1; font-size: 10px; color: #666; padding: 4px 2px 2px; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid #2a2a4e; margin-bottom: 2px; width: 100%;}
        .preset-grid-divider { grid-column: 1 / -1; height: 1px; background: #2a2a4e; margin: 4px 0; width: 100%;}
        .preset-btn.dragging { opacity: 0.4; border: 1px dashed #e0a800; pointer-events: none; }
        .preset-btn.drag-over { border: 1px solid #2a2a4e; background: #1e1e32; }
        .preset-btn.default-preset { border-color: #2a3a2a; }
        .preset-btn.default-preset .p-label { color: #4CAF50; }

        /* 토스트 */
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #e0a800; color: #12121e; padding: 8px 20px; border-radius: 20px; font-size: 13px; font-weight: bold; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
        .toast.show { opacity: 1; }
        .toast.hide { opacity: 0; transition: opacity 0.5s; }

        /* 모달 공통 */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: #1a1a2e; border: 1px solid #3a3a6e; border-radius: 12px; padding: 24px; min-width: 420px; max-width: 600px; width: 90%; }
        .modal h2 { color: #e0a800; font-size: 16px; margin-bottom: 16px; }
        .modal-section { margin-bottom: 12px; }
        .modal-section label { font-size: 12px; color: #aaa; display: block; margin-bottom: 6px; }
        .modal-section input, .modal-section textarea { width: 100%; background: #12121e; border: 1px solid #3a3a6e; border-radius: 6px; padding: 8px 10px; color: #e0e0e0; font-size: 13px; outline: none; }
        .modal-section input:focus, .modal-section textarea:focus { border-color: #e0a800; }
        .modal-section textarea { min-height: 300px; resize: vertical; font-family: monospace; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
        .btn-primary { background: #e0a800; color: #12121e; border: none; padding: 8px 20px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; }
        .btn-secondary { background: #2a2a4e; color: #aaa; border: 1px solid #3a3a6e; padding: 8px 20px; border-radius: 6px; font-size: 13px; cursor: pointer; }
        .btn-danger { background: #4a1a1a; color: #ff6b6b; border: 1px solid #6a2a2a; padding: 8px 20px; border-radius: 6px; font-size: 13px; cursor: pointer; }

        /* 설정 모달 메뉴 */
        .setting-menu { display: flex; flex-direction: column; gap: 8px; }
        .setting-menu-item { background: #12121e; border: 1px solid #2a2a4e; border-radius: 8px; padding: 12px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .setting-menu-item:hover { border-color: #e0a800; }
        .setting-menu-item span { font-size: 13px; }
        .setting-menu-item .arrow { color: #666; }

        .history-item { position: relative; padding-right: 28px; }
        .h-btn-group { position: absolute; top: 50%; right: 4px; transform: translateY(-50%); display: flex; flex-direction: column; gap: 2px; }
        .h-preset-btn { background: #2a2a4e; border: 1px solid #3a3a6e; color: #e0a800; width: 18px; height: 18px; border-radius: 4px; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; line-height: 1; }
        .h-preset-btn:hover { background: #e0a800; color: #12121e; }
        .h-delete-btn { background: #2a2a4e; border: 1px solid #3a3a6e; color: #ff6b6b; width: 18px; height: 18px; border-radius: 4px; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; line-height: 1; }
        .h-delete-btn:hover { background: #ff6b6b; color: #12121e; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #12121e; }
        ::-webkit-scrollbar-thumb { background: #3a3a6e; border-radius: 2px; }

        /* 탭 버튼 */
        .tab-switch { display: flex; gap: 4px; margin-right: 8px; }
        .tab-btn { background: #2a2a4e; border: 1px solid #3a3a6e; color: #aaa; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .tab-btn:hover { background: #3a3a6e; color: #fff; }
        .tab-btn.active { background: #4a90d9; color: #fff; border-color: #4a90d9; }

        /* Book 탭 패널 */
        .panel-book { display: none; flex: 1; flex-direction: column; overflow: hidden; padding: 16px; gap: 12px; }
        .panel-book.active { display: flex; }

        /* 검색바 */
        .book-search-wrap { position: relative; max-width: 480px; }
        .book-search-wrap input { width: 100%; background: #1e1e32; color: #e0e0e0; border: 1px solid #3a3a6e; border-radius: 8px; padding: 10px 14px; font-size: 14px; outline: none; }
        .book-search-wrap input:focus { border-color: #4a90d9; }
        .search-dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #1a1a2e; border: 1px solid #3a3a6e; border-radius: 8px; max-height: 240px; overflow-y: auto; z-index: 50; display: none; }
        .search-dropdown.open { display: block; }
        .search-item { padding: 8px 14px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #2a2a4e; }
        .search-item:last-child { border-bottom: none; }
        .search-item:hover { background: #252540; }
        .search-item .s-ko { color: #e0e0e0; }
        .search-item .s-en { color: #666; font-size: 11px; margin-top: 2px; }
        .search-item .s-cat { color: #4a90d9; font-size: 10px; }
        .search-highlight { color: #4a90d9; font-weight: bold; }

        /* 필터 바 */
        .book-filter { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .filter-btn { background: #2a2a4e; border: 1px solid #3a3a6e; color: #aaa; padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; }
        .filter-btn:hover { border-color: #4a90d9; color: #fff; }
        .filter-btn.active { background: #4a90d9; color: #fff; border-color: #4a90d9; }
        .filter-sep { color: #3a3a6e; }
        .filter-collected { background: #2a2a4e; border: 1px solid #3a3a6e; color: #aaa; padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; }
        .filter-collected:hover { border-color: #e0a800; color: #fff; }
        .filter-collected.active { background: #e0a800; color: #12121e; border-color: #e0a800; font-weight: bold; }

        /* 책 그리드 */
        .book-grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; align-content: start; }
        .book-card { background: #1e1e32; border: 1px solid #2a2a4e; border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: border-color 0.15s; display: flex; flex-direction: column; gap: 4px; }
        .book-card:hover { border-color: #4a90d9; }
        .book-card.done { border-color: #2a5a2a; background: #1a2a1a; }
        .book-card.done:hover { border-color: #4CAF50; }
        .book-card.partial { border-color: #5a4a1a; background: #2a2510; }
        .book-card.partial:hover { border-color: #e0a800; }
        .book-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
        .book-ko { font-size: 13px; font-weight: bold; color: #e0e0e0; line-height: 1.4; flex: 1; }
        .book-en { font-size: 11px; color: #666; line-height: 1.3; }
        .book-card-bottom { display: flex; justify-content: space-between; align-items: center; }
        .book-cat { font-size: 10px; color: #4a90d9; }
        .book-progress { font-size: 12px; font-weight: bold; }
        .book-progress.done { color: #4CAF50; }
        .book-progress.partial { color: #e0a800; }
        .book-progress.none { color: #555; }
        .book-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #3a3a6e; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
        .book-check.done { background: #4CAF50; border-color: #4CAF50; color: #fff; }
        .book-check.partial { background: #e0a800; border-color: #e0a800; color: #12121e; }
        .book-check.none { background: transparent; }

        /* 통계 바 */
        .book-stats { font-size: 12px; color: #666; display: flex; gap: 16px; }
        .book-stats span { color: #aaa; }
        .book-stats .stat-done { color: #4CAF50; }
        .book-stats .stat-partial { color: #e0a800; }

        /* 소제목 체크리스트 */
        .book-card.has-subtitles { cursor: default; }
        .book-card.has-subtitles:hover { border-color: #2a2a4e; }
        .book-card.has-subtitles.done:hover { border-color: #2a5a2a; }
        .book-card.has-subtitles.partial:hover { border-color: #5a4a1a; }
        .book-subtitles { display: flex; flex-direction: column; gap: 2px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #2a2a4e; }
        .subtitle-item { display: flex; align-items: center; gap: 7px; cursor: pointer; padding: 3px 4px; border-radius: 4px; }
        .subtitle-item:hover { background: rgba(255,255,255,0.05); }
        .subtitle-check { width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid #3a3a6e; display: flex; align-items: center; justify-content: center; font-size: 9px; flex-shrink: 0; }
        .subtitle-check.done { background: #4CAF50; border-color: #4CAF50; color: #fff; }
        .subtitle-label { font-size: 11px; color: #999; line-height: 1.3; }
        .subtitle-item.done .subtitle-label { color: #4CAF50; text-decoration: line-through; opacity: 0.7; }
    </style>
</head>
<body>

<div class="header">
    <h1>⚔️ BP 번역기</h1>
    <div class="tab-switch">
        <button class="tab-btn active" id="tab-translator" onclick="switchTab('translator')">📝 번역기</button>
        <button class="tab-btn" id="tab-book" onclick="switchTab('book')">📚 Book</button>
    </div>
    <div class="user-switch">
        <button class="user-btn active" id="btn-Atriel" onclick="switchUser('Atriel')">Atriel</button>
        <button class="user-btn" id="btn-kuku" onclick="switchUser('kuku')">kuku</button>
    </div>
    <button class="btn-setting" onclick="openSetting()">⚙️ 설정</button>
</div>

<div class="main">

    <!-- 번역 패널 -->
    <div class="panel-translate">
        <textarea id="inputText" placeholder="번역할 텍스트 입력... (Ctrl+Enter로 번역)"></textarea>
        <div class="translate-actions">
            <button class="btn-translate" onclick="doTranslate()">번역</button>
            <button class="btn-clear" onclick="clearAll()">초기화</button>
        </div>
        <div class="result-box">
            <div class="result-text" id="resultText"><span style="color:#555">번역 결과가 여기에 표시됩니다</span></div>
            <button class="copy-btn" onclick="copyResult()">복사</button>
        </div>
    </div>

    <!-- 히스토리 패널 -->
    <div class="panel-history">
        <div class="panel-title">
            📋 최근 번역
            <button onclick="clearHistory()">전체삭제</button>
        </div>
        <div class="history-list" id="historyList"></div>
    </div>

    <!-- 프리셋 패널 -->
    <div class="panel-preset">
        <div class="panel-title">⭐ 프리셋</div>
        <div class="preset-grid" id="presetGrid"></div>
    </div>

</div>

<!-- Book 탭 패널 -->
<div class="panel-book" id="panel-book">
    <div style="display:flex; gap:16px; align-items:center; flex-wrap:wrap;">
        <div class="book-search-wrap">
            <input type="text" id="bookSearch" placeholder="책 이름 검색 (한국어 or 영어)..." oninput="onBookSearch(this.value)" onblur="setTimeout(()=>closeDropdown(),150)">
            <div class="search-dropdown" id="searchDropdown"></div>
        </div>
        <div class="book-stats" id="bookStats"></div>
        <button class="btn-setting" onclick="downloadProgress()" style="flex-shrink:0">⬇️ 진행현황 저장</button>
    </div>
    <div class="book-filter" id="bookFilter">
        <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
        <button class="filter-btn" onclick="setFilter('Books & Manuals', this)">📖 Books</button>
        <button class="filter-btn" onclick="setFilter('Letters & Records', this)">✉️ Letters</button>
        <button class="filter-btn" onclick="setFilter('Notices & Posters', this)">📄 Notices</button>
        <button class="filter-btn" onclick="setFilter('Other Readables', this)">📜 Other</button>
        <span class="filter-sep">|</span>
        <button class="filter-collected active" id="filterCollected" onclick="toggleCollectedFilter(this)">🔲 미수집만 보기</button>
    </div>
    <div class="book-grid" id="bookGrid"></div>
</div>

<!-- 설정 모달 -->
<div class="modal-overlay" id="modalSetting">
    <div class="modal">
        <h2>⚙️ 설정</h2>
        <div class="setting-menu">
            <div class="setting-menu-item" onclick="openPromptModal()">
                <span>📝 프롬프트 편집</span>
                <span class="arrow">▶</span>
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn-secondary" onclick="closeSetting()">닫기</button>
        </div>
    </div>
</div>

<!-- 프롬프트 편집 모달 -->
<div class="modal-overlay" id="modalPrompt">
    <div class="modal" style="max-width:700px">
        <h2>📝 프롬프트 편집</h2>
        <div class="modal-section">
            <label>시스템 프롬프트</label>
            <textarea id="promptText"></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn-danger" onclick="resetPrompt()">기본값으로 초기화</button>
            <button class="btn-secondary" onclick="closePromptModal()">취소</button>
            <button class="btn-primary" onclick="savePrompt()">저장</button>
        </div>
    </div>
</div>

<!-- 프리셋 추가/수정 모달 -->
<div class="modal-overlay" id="modalPreset">
    <div class="modal">
        <h2 id="presetModalTitle">프리셋 추가</h2>
        <div class="modal-section">
            <label>라벨 (버튼에 표시될 이름)</label>
            <input type="text" id="presetLabel" placeholder="예: 거탑 모집">
        </div>
        <div class="modal-section">
            <label>내용 (클릭 시 복사될 텍스트)</label>
            <textarea id="presetTextInput" style="min-height:80px" placeholder="예: 거탑 M19 @T1 D2 31500 or 해무기"></textarea>
        </div>
        <div class="modal-actions">
            <button class="btn-secondary" onclick="closePresetModal()">취소</button>
            <button class="btn-primary" onclick="savePreset()">저장</button>
        </div>
    </div>
</div>

<script>
    let editingPresetId = null;
    let currentUser = 'Atriel';
    let histories = {
      Atriel: JSON.parse(localStorage.getItem('bp_history_Atriel') || '[]'),
      kuku: JSON.parse(localStorage.getItem('bp_history_kuku') || '[]')
    };
    let history = histories[currentUser];
    let defaultPrompt = '';

    function switchUser(user) {
      currentUser = user;
      history = histories[user];
      document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-' + user).classList.add('active');
      renderHistory();
      loadPresets();
      clearAll();
      // Book 탭이 열려있으면 해당 유저 데이터 리로드
      if (document.getElementById('panel-book').classList.contains('active')) {
        initBook();
      }
    }

    // ===================== 탭 전환 =====================
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.querySelector('.main').style.display = tab === 'translator' ? 'flex' : 'none';
      document.getElementById('panel-book').classList.toggle('active', tab === 'book');
      if (tab === 'book') initBook();
    }

    // ===================== Book 탭 =====================
    let bookData = [];
    let bookLoaded = false;
    let currentCatFilter = 'all';
    let showOnlyUncollected = false;

    async function initBook() {
      try {
        const res = await fetch('/api/book/progress/' + currentUser);
        bookData = await res.json();
        bookLoaded = true;
        renderBookGrid();
        renderBookStats();
      } catch(e) {
        document.getElementById('bookGrid').innerHTML = '<div style="color:#ff6b6b;padding:20px">book.json 로드 실패: ' + e.message + '</div>';
      }
    }

    function renderBookStats() {
      const total = bookData.length;
      const done = bookData.filter(b => b.collected > 0 && b.collected >= b.total).length;
      const partial = bookData.filter(b => b.collected > 0 && b.collected < b.total).length;
      const none = bookData.filter(b => !b.collected || b.collected === 0).length;
      document.getElementById('bookStats').innerHTML = `
        총 <span>${total}</span>개 &nbsp;
        <span class="stat-done">완료 ${done}</span> &nbsp;
        <span class="stat-partial">진행중 ${partial}</span> &nbsp;
        미수집 <span>${none}</span>
      `;
    }

    function setFilter(cat, btn) {
      currentCatFilter = cat;
      document.querySelectorAll('.book-filter .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderBookGrid();
    }

    function toggleCollectedFilter(btn) {
      showOnlyUncollected = !showOnlyUncollected;
      btn.classList.toggle('active', showOnlyUncollected);
      btn.textContent = showOnlyUncollected ? '🔲 미수집만 보기' : '🔲 미수집만 보기';
      renderBookGrid();
    }

    function renderBookGrid(filtered) {
      const grid = document.getElementById('bookGrid');
      let list = filtered || bookData;
      if (currentCatFilter !== 'all') list = list.filter(b => b.category === currentCatFilter);
      if (showOnlyUncollected) list = list.filter(b => !b.collected || b.collected === 0);
      if (!list.length) { grid.innerHTML = '<div style="color:#555;padding:20px">항목 없음</div>'; return; }

      grid.innerHTML = list.map(b => {
        const hasSubs = b.subtitles && b.subtitles.length > 0;
        const collectedSubs = b.collected_subtitles || [];
        const isDone = hasSubs
          ? collectedSubs.length >= b.subtitles.length
          : b.collected >= b.total;
        const isPartial = hasSubs
          ? collectedSubs.length > 0 && collectedSubs.length < b.subtitles.length
          : b.collected > 0 && b.collected < b.total;
        const cardClass = (isDone ? 'done' : isPartial ? 'partial' : '') + (hasSubs ? ' has-subtitles' : '');
        const progClass = isDone ? 'done' : isPartial ? 'partial' : 'none';
        const catLabel = {'Books & Manuals':'📖 Books','Letters & Records':'✉️ Letters','Notices & Posters':'📄 Notices','Other Readables':'📜 Other'}[b.category] || b.category;
        const collectedCount = hasSubs ? collectedSubs.length : b.collected;
        const totalCount = hasSubs ? b.subtitles.length : b.total;

        // 체크 아이콘 (subtitles 없는 책만 카드 우상단에 표시)
        const checkHtml = !hasSubs ? `<div class="book-check ${isDone ? 'done' : 'none'}">${isDone ? '✓' : ''}</div>` : '';
        const clickHandler = !hasSubs ? `onclick="toggleBookCollected(${b.id})"` : '';

        // 소제목 리스트
        const subsHtml = hasSubs ? `
          <div class="book-subtitles">
            ${b.subtitles.map(s => {
              const checked = collectedSubs.includes(s);
              return `<div class="subtitle-item ${checked ? 'done' : ''}" onclick="toggleSubtitle(${b.id}, '${escHtml(s).replace(/'/g, "\\'")}')">
                <div class="subtitle-check ${checked ? 'done' : ''}">✓</div>
                <span class="subtitle-label">${escHtml(s)}</span>
              </div>`;
            }).join('')}
          </div>` : '';

        return `<div class="book-card ${cardClass}" ${clickHandler}>
          <div class="book-card-top">
            <div>
              <div class="book-ko">${escHtml(b.ko || b.title)}</div>
              <div class="book-en">${escHtml(b.title)}</div>
            </div>
            ${checkHtml}
          </div>
          <div class="book-card-bottom">
            <span class="book-cat">${catLabel}</span>
            <span class="book-progress ${progClass}">${collectedCount}/${totalCount}</span>
          </div>
          ${subsHtml}
        </div>`;
      }).join('');
    }

    function toggleBookCollected(id) {
      const book = bookData.find(b => b.id === id);
      if (!book) return;
      book.collected = book.collected >= book.total ? 0 : book.total;
      saveBookProgress();
      renderBookGrid();
      renderBookStats();
    }

    function toggleSubtitle(id, subtitle) {
      const book = bookData.find(b => b.id === id);
      if (!book) return;
      if (!book.collected_subtitles) book.collected_subtitles = [];
      const idx = book.collected_subtitles.indexOf(subtitle);
      if (idx >= 0) book.collected_subtitles.splice(idx, 1);
      else book.collected_subtitles.push(subtitle);
      book.collected = book.collected_subtitles.length;
      saveBookProgress();
      renderBookGrid();
      renderBookStats();
    }

    async function saveBookProgress() {
      try {
        await fetch('/api/book/progress/' + currentUser, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(bookData)
        });
      } catch(e) { console.error('저장 실패:', e); }
    }

    function downloadProgress() {
      const blob = new Blob([JSON.stringify(bookData, null, 2)], {type: 'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'book.json';
      a.click();
    }

    // 검색 자동완성
    function onBookSearch(val) {
      if (!bookLoaded) return;
      const q = val.trim().toLowerCase();
      const dd = document.getElementById('searchDropdown');
      if (!q) { dd.classList.remove('open'); renderBookGrid(); return; }

      const results = bookData.filter(b =>
        (b.ko && b.ko.toLowerCase().includes(q)) ||
        b.title.toLowerCase().includes(q)
      ).slice(0, 20);

      if (!results.length) { dd.classList.remove('open'); renderBookGrid([]); return; }

      dd.innerHTML = results.map(b => {
        const koHL = b.ko ? highlight(b.ko, q) : '';
        const enHL = highlight(b.title, q);
        const catLabel = {'Books & Manuals':'📖','Letters & Records':'✉️','Notices & Posters':'📄','Other Readables':'📜'}[b.category] || '';
        return `<div class="search-item" onmousedown="selectSearchItem(${b.id})">
          <div class="s-ko">${koHL || enHL}</div>
          <div class="s-en">${koHL ? enHL : ''} <span class="s-cat">${catLabel}</span></div>
        </div>`;
      }).join('');
      dd.classList.add('open');
      renderBookGrid(results);
    }

    function highlight(str, q) {
      const idx = str.toLowerCase().indexOf(q);
      if (idx === -1) return escHtml(str);
      return escHtml(str.slice(0, idx)) + '<span class="search-highlight">' + escHtml(str.slice(idx, idx + q.length)) + '</span>' + escHtml(str.slice(idx + q.length));
    }

    function selectSearchItem(id) {
      const book = bookData.find(b => b.id === id);
      if (!book) return;
      document.getElementById('bookSearch').value = book.ko || book.title;
      closeDropdown();
      renderBookGrid([book]);
    }

    function closeDropdown() {
      document.getElementById('searchDropdown').classList.remove('open');
    }

    // ===================== 기존 init =====================
    async function init() {
      renderHistory();
      await loadPresets();
      const res = await fetch('/prompt');
      const data = await res.json();
      defaultPrompt = data.prompt;
    }

    // 번역
    async function doTranslate() {
      const text = document.getElementById('inputText').value.trim();
      if (!text) return;
      const resultEl = document.getElementById('resultText');
      resultEl.innerHTML = '<span class="loading">번역 중...</span>';
      try {
        const res = await fetch('/translate', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({text})
        });
        const data = await res.json();
        resultEl.textContent = data.result;
        addHistory(text, data.result, data.jpText);
      } catch(e) {
        resultEl.textContent = '오류가 발생했습니다.';
      }
    }

    function clearAll() {
      document.getElementById('inputText').value = '';
      document.getElementById('resultText').innerHTML = '<span style="color:#555">번역 결과가 여기에 표시됩니다</span>';
    }

    function copyResult() {
      const text = document.getElementById('resultText').textContent;
      if (text && text !== '번역 결과가 여기에 표시됩니다') {
        navigator.clipboard.writeText(text);
      }
    }

    // Ctrl+Enter 번역
    document.getElementById('inputText').addEventListener('keydown', e => {
      if (e.ctrlKey && e.key === 'Enter') doTranslate();
    });

    // 히스토리
    function addHistory(original, translated, jpText) {
      history.unshift({original, translated, jpText, id: Date.now()});
      if (history.length > 20) history.pop();
      localStorage.setItem('bp_history_' + currentUser, JSON.stringify(history));
      renderHistory();
    }

    function renderHistory() {
      const el = document.getElementById('historyList');
      el.innerHTML = history.map((h, i) => `
        <div class="history-item" onclick="setHistoryItem('${escHtml(h.original)}', '${escHtml(h.translated)}')">
          <div class="h-original">${escHtml(h.original)}</div>
          <div class="h-translated">${escHtml(h.translated)}</div>
          <div class="h-btn-group">
            <button class="h-preset-btn" onclick="event.stopPropagation();openPresetFromHistory('${escHtml(h.jpText || h.translated)}')">+</button>
            <button class="h-delete-btn" onclick="event.stopPropagation();deleteHistory(${i})">✕</button>
          </div>
        </div>
      `).join('');
    }

    function clearHistory() {
      histories[currentUser] = [];
      history = histories[currentUser];
      localStorage.setItem('bp_history_' + currentUser, '[]');
      renderHistory();
    }

    function setInput(text) {
      document.getElementById('inputText').value = text;
    }

    function setHistoryItem(original, translated) {
      document.getElementById('inputText').value = original;
      document.getElementById('resultText').textContent = translated;
    }

    function deleteHistory(index) {
      history.splice(index, 1);
      localStorage.setItem('bp_history_' + currentUser, JSON.stringify(history));
      renderHistory();
    }

    // 프리셋
    async function loadPresets() {
      const res = await fetch('/api/preset/' + currentUser);
      const presets = await res.json();
      renderPresets(presets);
    }

    function renderPresets(presets) {
      const grid = document.getElementById('presetGrid');
      const defaultPresets = presets.filter(p => p.id.startsWith('default-'));
      const customPresets = presets.filter(p => !p.id.startsWith('default-'));

      const defaultHtml = `
        <div class="preset-section-label">기본</div>
        ${defaultPresets.map(p => `
          <div class="preset-btn default-preset" onclick="copyPreset('${escHtml(p.text)}')">
            <div class="p-label">${escHtml(p.label)}</div>
            <div class="p-text">${escHtml(p.text)}</div>
          </div>
        `).join('')}
        <div class="preset-grid-divider"></div>
        <div class="preset-section-label">커스텀</div>
      `;

      const customHtml = customPresets.map(p => `
          <div class="preset-btn"
               data-id="${p.id}"
               data-text="${escHtml(p.text)}">
            <div class="p-label">${escHtml(p.label)}</div>
            <div class="p-text">${escHtml(p.text)}</div>
            <div class="p-actions">
              <button onmousedown="event.stopPropagation()" onclick="event.stopPropagation();editPreset('${p.id}','${escHtml(p.label)}','${escHtml(p.text)}')">✏</button>
              <button onmousedown="event.stopPropagation()" onclick="event.stopPropagation();deletePreset('${p.id}')">✕</button>
            </div>
          </div>
        `).join('') + `<div class="preset-add" onclick="openPresetModal()">+</div>`;

      grid.innerHTML = defaultHtml + customHtml;

      grid.querySelectorAll('.preset-btn[data-id]').forEach(btn => {
          btn.addEventListener('mousedown', (e) => {
            onPresetMouseDown(e, btn.dataset.id, btn.dataset.text);
          });
        });
    }

    function handlePresetClick(event, text) {
      clearPressTimer();
      if (!isDragging && !event.target.closest('.p-actions')) {
        copyPreset(text);
      }
    }

    function copyPreset(text) {
      navigator.clipboard.writeText(text);
      // 입력창에도 넣기
      document.getElementById('inputText').value = text;
    }

    function openPresetModal() {
      editingPresetId = null;
      document.getElementById('presetModalTitle').textContent = '프리셋 추가';
      document.getElementById('presetLabel').value = '';
      document.getElementById('presetTextInput').value = '';
      document.getElementById('modalPreset').classList.add('active');
    }

    function openPresetFromHistory(translatedText) {
      editingPresetId = null;
      document.getElementById('presetModalTitle').textContent = '프리셋 추가';
      document.getElementById('presetLabel').value = '';
      document.getElementById('presetTextInput').value = translatedText;
      document.getElementById('modalPreset').classList.add('active');
    }

    function editPreset(id, label, text) {
      editingPresetId = id;
      document.getElementById('presetModalTitle').textContent = '프리셋 수정';
      document.getElementById('presetLabel').value = label;
      document.getElementById('presetTextInput').value = text;
      document.getElementById('modalPreset').classList.add('active');
    }

    async function savePreset() {
      const label = document.getElementById('presetLabel').value.trim();
      const text = document.getElementById('presetTextInput').value.trim();
      if (!label || !text) return;
      if (editingPresetId) {
        await fetch(`/api/preset/${currentUser}/${editingPresetId}`, {
          method: 'PUT',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({label, text})
        });
      } else {
        await fetch('/api/preset/' + currentUser, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({label, text})
        });
      }
      closePresetModal();
      await loadPresets();
    }

    async function deletePreset(id) {
      await fetch(`/api/preset/${currentUser}/${id}`, {method: 'DELETE'});
      await loadPresets();
    }

    // 토스트
    function showToast() {
      const t = document.getElementById('toast');
      t.classList.remove('hide');
      t.classList.add('show');
      setTimeout(() => {
        t.classList.remove('show');
        t.classList.add('hide');
      }, 1000);
    }

    // 클립보드 복사
    function copyPreset(text) {
      navigator.clipboard.writeText(text);
      showToast();
    }

    // 길게 누르기
    let pressTimer = null;
    let isDragging = false;

    // 드래그 앤 드롭 (mousemove 기반)
    let dragState = null; // { id, el, startX, startY, clone }
    let dropTargetId = null;
    let dropPosition = null; // 'before' | 'after'
    const DRAG_THRESHOLD = 8;

    function getCustomBtns() {
      return [...document.querySelectorAll('.preset-btn[data-id]')];
    }

    function removeDragClone() {
      document.querySelectorAll('.drag-clone').forEach(el => el.remove());
      document.querySelectorAll('.drop-indicator').forEach(el => el.remove());
      getCustomBtns().forEach(el => el.classList.remove('dragging'));
      document.getElementById('presetGrid').classList.remove('is-dragging');
    }

    function onPresetMouseDown(e, id, text) {
      if (e.target.closest('.p-actions')) return;
      dragState = { id, text, el: e.currentTarget, startX: e.clientX, startY: e.clientY, dragging: false };

      const onMouseMove = (e) => {
        if (!dragState) return;
        const dx = e.clientX - dragState.startX;
        const dy = e.clientY - dragState.startY;

        if (!dragState.dragging && Math.sqrt(dx*dx + dy*dy) > DRAG_THRESHOLD) {
          dragState.dragging = true;
          document.getElementById('presetGrid').classList.add('is-dragging');
          dragState.el.classList.add('dragging');
        }

        if (!dragState.dragging) return;

        // 드롭 위치 계산
        const btns = getCustomBtns().filter(b => b.dataset.id !== dragState.id);
        let newTarget = null, newPos = null;

        for (const btn of btns) {
          const rect = btn.getBoundingClientRect();
          // 같은 행인지 확인 (Y 범위 안에 있는지)
          if (e.clientY >= rect.top && e.clientY <= rect.bottom) {
            const midX = rect.left + rect.width / 2;
            if (e.clientX < midX) {
              newTarget = btn.dataset.id;
              newPos = 'before';
              break;
            } else {
              newTarget = btn.dataset.id;
              newPos = 'after';
            }
          }
        }

        // 같은 행에 없으면 가장 가까운 행으로
            if (!newTarget && btns.length > 0) {
          let closest = null, closestDist = Infinity;
          for (const btn of btns) {
            const rect = btn.getBoundingClientRect();
            const cy = rect.top + rect.height / 2;
            const dist = Math.abs(e.clientY - cy);
            if (dist < closestDist) { closestDist = dist; closest = btn; }
          }
          if (closest) {
            const rect = closest.getBoundingClientRect();
            newTarget = closest.dataset.id;
            newPos = e.clientX < rect.left + rect.width / 2 ? 'before' : 'after';
          }
        }

        if (newTarget !== dropTargetId || newPos !== dropPosition) {
          dropTargetId = newTarget;
          dropPosition = newPos;
          renderDropIndicator();
        }
      };

      const onMouseUp = async (e) => {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);

        if (!dragState) return;
        const wasDragging = dragState.dragging;
        const id = dragState.id;
        const text = dragState.text;
        dragState = null;

        removeDragClone();

        if (!wasDragging) {
          // 클릭 → 복사
          if (!e.target.closest('.p-actions')) copyPreset(text);
          dropTargetId = null; dropPosition = null;
          return;
        }

        // 드래그 완료 → 순서 저장
        if (dropTargetId) {
          const res = await fetch('/api/preset/' + currentUser);
          const presets = await res.json();
          const custom = presets.filter(p => !p.id.startsWith('default-'));
          const ids = custom.map(p => p.id);
          const srcIdx = ids.indexOf(id);
          ids.splice(srcIdx, 1);
          let tgtIdx = ids.indexOf(dropTargetId);
          if (dropPosition === 'after') tgtIdx += 1;
          ids.splice(tgtIdx, 0, id);

          await fetch('/api/preset/' + currentUser + '/reorder', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(ids)
          });
          await loadPresets();
        }

        dropTargetId = null;
        dropPosition = null;
      };

      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    }

    function renderDropIndicator() {
      document.querySelectorAll('.drop-indicator').forEach(el => el.remove());
      if (!dropTargetId) return;

      const grid = document.getElementById('presetGrid');
      const targetEl = grid.querySelector(`[data-id="${dropTargetId}"]`);
      if (!targetEl) return;

      const gridRect = grid.getBoundingClientRect();
      const targetRect = targetEl.getBoundingClientRect();

      const indicator = document.createElement('div');
      indicator.className = 'drop-indicator';

      const x = dropPosition === 'before'
        ? targetRect.left - gridRect.left - 1
        : targetRect.right - gridRect.left - 1;
      const y = targetRect.top - gridRect.top + (targetRect.height / 2) - 22;

      indicator.style.left = x + 'px';
      indicator.style.top = y + 'px';

      grid.appendChild(indicator);
    }

    // handlePresetClick 삭제하고 copyPreset에 토스트만 남기기
    function copyPreset(text) {
      navigator.clipboard.writeText(text);
      document.getElementById('inputText').value = text;
      showToast();
    }

    function closePresetModal() {
      document.getElementById('modalPreset').classList.remove('active');
    }

    // 설정 모달
    function openSetting() { document.getElementById('modalSetting').classList.add('active'); }
    function closeSetting() { document.getElementById('modalSetting').classList.remove('active'); }

    // 프롬프트 모달
    async function openPromptModal() {
      const res = await fetch('/prompt');
      const data = await res.json();
      document.getElementById('promptText').value = data.prompt;
      document.getElementById('modalPrompt').classList.add('active');
    }

    function closePromptModal() { document.getElementById('modalPrompt').classList.remove('active'); }

    async function savePrompt() {
      const prompt = document.getElementById('promptText').value;
      await fetch('/prompt', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({prompt})
      });
      closePromptModal();
    }

    async function resetPrompt() {
      document.getElementById('promptText').value = defaultPrompt;
    }

    // 유틸
    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    // 모달 외부 클릭 닫기
    document.querySelectorAll('.modal-overlay').forEach(el => {
      el.addEventListener('click', e => { if (e.target === el) el.classList.remove('active'); });
    });

    init();
</script>
